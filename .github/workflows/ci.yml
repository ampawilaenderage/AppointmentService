name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  # ── Run all .NET tests ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Install Frontend dependencies
        run: npm install
        working-directory: Frontend

      - name: Restore dependencies
        run: dotnet restore AppointmentService.slnx

      - name: Build solution
        run: dotnet build AppointmentService.slnx --no-restore --configuration Release

      - name: Run UserService tests
        run: dotnet test UserService.Tests/UserService.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run AppointmentService tests
        run: dotnet test AppointmentService.Tests/AppointmentService.Tests.csproj --no-build --configuration Release --verbosity normal

  # ── Build and push Docker images to Docker Hub ─────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push UserService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: UserService/Dockerfile
          push: true
          tags: esajith/userservice:latest

      - name: Build and push AppointmentService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: AppointmentService/Dockerfile
          push: true
          tags: esajith/appointmentservice:latest

      - name: Build and push NotificationService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: NotificationService/Dockerfile
          push: true
          tags: esajith/notificationservice:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: Frontend/Dockerfile
          push: true
          tags: esajith/frontend:latest
